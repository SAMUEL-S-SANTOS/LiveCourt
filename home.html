<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description"
        content="Encontre quadras de esportes próximas a você e veja quem está jogando em tempo real">
    <meta name="theme-color" content="#007AFF">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0"
        rel="stylesheet" />

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar">
        <div style="padding: 28px 20px 20px;">

            <!-- Logo -->
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:32px;">
                <div
                    style="width:44px; height:44px; border-radius:50%; background:#1C1B1F; border:2px solid #FF5722; display:flex; align-items:center; justify-content:center;">
                    <svg width="24" height="24" viewBox="0 0 108 108" fill="none" stroke="#FF5722" stroke-width="4">
                        <circle cx="54" cy="54" r="38" />
                        <path d="M54 16V92M16 54H92" />
                        <path d="M28 28Q44 54 28 80M80 28Q64 54 80 80" />
                    </svg>
                </div>
                <div>
                    <div class="mono"
                        style="font-size:9px; font-weight:700; color:#FF5722; letter-spacing:0.15em; text-transform:uppercase;">
                        São Paulo</div>
                    <div style="font-size:17px; font-weight:800; color:white; line-height:1.1;">Court Finder</div>
                </div>
            </div>

            <!-- Nav -->
            <nav style="display:flex; flex-direction:column; gap:2px;">
                <div class="nav-item active" id="nav-map" onclick="switchTab('map')">
                    <span class="material-symbols-outlined">map</span> Home
                </div>
                <div class="nav-item" id="nav-search" onclick="switchTab('search')">
                    <span class="material-symbols-outlined">view_list</span> Quadras
                </div>
                <div class="nav-item" id="nav-add" onclick="switchTab('add')">
                    <span class="material-symbols-outlined">add_box</span> Cadastrar Quadra
                </div>
                <div class="nav-item" id="nav-profile" onclick="switchTab('profile')">
                    <span class="material-symbols-outlined">account_circle</span> Perfil
                </div>
            </nav>
        </div>

        <!-- Usuário logado (rodapé do sidebar) -->
        <div style="margin-top:auto; padding:20px; border-top:1px solid #303030;">
            <div style="display:flex; align-items:center; gap:10px;">
                <div
                    style="width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#FF5722,#FFAB91); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:white;">
                    JD</div>
                <div>
                    <div style="font-size:13px; font-weight:700; color:white;">Jogador de Quadra</div>
                    <div style="font-size:11px; color:#938F99;">Nível 12 • Amador Elite</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- ÁREA DE CONTEÚDO -->
    <div id="content-area">

        <!-- TOPBAR (global) -->
        <header
            style="position:sticky; top:0; z-index:50; background:#0F1012; border-bottom:1px solid #303030; padding:16px 28px; display:flex; align-items:center; gap:16px;">
            <!-- Botão hamburguer — só aparece no mobile (controlado por JS) -->
            <button id="hamburger-btn" onclick="toggleSidebar()"
                style="display:none; width:38px; height:38px; background:#1C1B1F; border:1px solid #303030; border-radius:10px; cursor:pointer; color:white; align-items:center; justify-content:center;">
                <span class="material-symbols-outlined" style="font-size:20px;">menu</span>
            </button>

            <h1 id="page-title" style="font-size:22px; font-weight:800; color:white; margin:0; flex:1;">Ver no Mapa</h1>

            <div style="display:flex; align-items:center; gap:10px;">
                <!-- Campo de busca global -->
                <div style="position:relative;">
                    <input id="global-search" type="text" placeholder="Buscar quadras..."
                        style="width:280px; padding-left:38px;" oninput="handleSearch(this.value)">
                    <span class="material-symbols-outlined"
                        style="position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:18px; color:#938F99;">search</span>
                </div>
                <!-- Avatar do usuário -->
                <div
                    style="width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#FF5722,#FFAB91); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:white;">
                    JD</div>
            </div>
        </header>

        <!-- VIEWS — cada bloco representa uma página separada -->
        <main style="padding:28px;">


            <!--
    ================================================================
      PÁGINA: MAPA
      Quando separar → map.html + styles/map.css + js/map.js
    ================================================================
    -->
            <div id="view-map">


                <div id="map-canvas">

                    <!-- Estradas decorativas -->
                    <div class="map-road-h"
                        style="top:35%; height:16px; transform:rotate(-4deg); transform-origin:left;"></div>
                    <div class="map-road-v" style="left:30%; width:18px;"></div>
                    <div class="map-road-h" style="top:65%; height:10px; opacity:0.4;"></div>

                    <!-- Marker do usuário (pulsante azul) -->
                    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:20;">
                        <span style="display:flex; width:20px; height:20px; position:relative;">
                            <span
                                style="position:absolute; display:inline-flex; width:100%; height:100%; border-radius:50%; background:#3B82F6; opacity:0.5; animation:ping 1.5s cubic-bezier(0,0,0.2,1) infinite;"></span>
                            <span
                                style="position:relative; display:inline-flex; border-radius:50%; width:20px; height:20px; background:#3B82F6; border:2px solid white;"></span>
                        </span>
                    </div>

                    <!-- Marker Quadra 1 -->
                    <div class="map-marker-halo" style="top:26%; left:24%;"></div>
                    <div class="map-marker" style="top:26%; left:24%;" onclick="openDetail(1)">
                        <span class="material-symbols-outlined">sports_basketball</span>
                    </div>

                    <!-- Marker Quadra 2 -->
                    <div class="map-marker-halo" style="top:38%; left:72%;"></div>
                    <div class="map-marker" style="top:38%; left:72%;" onclick="openDetail(2)">
                        <span class="material-symbols-outlined">sports_basketball</span>
                    </div>

                    <!-- Card de localização atual -->
                    <div id="map-location-card">
                        <span class="material-symbols-outlined"
                            style="color:#FF5722; font-size:20px;">location_on</span>
                        <div>
                            <div style="font-size:13px; font-weight:700; color:white;">Parque do Povo</div>
                            <div style="font-size:11px; color:#938F99;">São Paulo - SP • Próximo a você</div>
                        </div>
                    </div>

                    <!-- Controles de zoom -->
                    <div id="map-zoom-controls">
                        <button class="map-zoom-btn">+</button>
                        <button class="map-zoom-btn">−</button>
                    </div>

                </div>
                <!-- fim #map-canvas -->

            </div>

        </main>
    </div>
    <script src="./js/app.js"></script>
    <script>
        switchTab('map');
    </script>

</body>

</html>
