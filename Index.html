<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description"
        content="Encontre quadras de esportes próximas a você e veja quem está jogando em tempo real">
    <meta name="theme-color" content="#007AFF">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <title>LiveCourt</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#0F1012] text-[#E6E1E5] flex justify-center items-center min-h-screen">
    <div id="welcome-screen" class="absolute inset-0 z-50 flex flex-col justify-between p-8 bg-gradient-to-b from-[#0F1012] via-[#141416] to-[#1C1B1F] transition-all duration-500">
      
      

      <!-- Logotipo & Ilustração Central -->
      <div class="flex flex-col items-center text-center my-auto gap-6">
        <div class="relative w-32 h-32 bg-[#1C1B1F] rounded-full border-2 border-[#FF5722] flex items-center justify-center shadow-lg active:scale-95 transition-transform duration-300">
          <!-- Ícone de Basquete em Vetor Dinâmico -->
          <svg class="w-16 h-16 text-[#FF5722]" viewBox="0 0 108 108" fill="none" stroke="currentColor" stroke-width="3">
            <circle cx="54" cy="54" r="40" stroke="#FF5722"/>
            <path d="M54 14 V94 M14 54 H94" stroke="#FF5722"/>
            <path d="M26 26 Q44 54 26 82 M82 26 Q64 54 82 82" stroke="#FF5722"/>
          </svg>
          <div class="absolute -top-1 -right-1 bg-red-600 text-[9px] font-bold px-2 py-0.5 rounded-full ring-2 ring-[#0F1012] animate-pulse">LIVE</div>
        </div>
        
        <div>
          <h1 class="text-3xl font-black tracking-tight text-white">COURT FINDER</h1>
          <p class="text-[#938F99] mt-1 text-sm tracking-wide">Explore, jogue e agende quadras instantaneamente</p>
        </div>
      </div>

      <!-- Botões de Ação Inferiores -->
      <div class="flex flex-col gap-34 pb-4">
        <button class="w-96 h-18 bg-[#FF5722] text-white font-bold rounded-2xl shadow-lg shadow-[#FF5722]/15 custom-ripple transition-all cursor-pointer mx-auto">
          <a href="home.html">ENTRAR NO APLICATIVO</a>
        </button>

        <p class="text-center text-[10px] text-[#938F99] px-4">
          Aqui você encontra as melhores quadras de esportes da sua região.
        </p>
      </div>
    </div>


    <script src="index.js"></script>
</body>

</html>
